spring.application.name=OpenForge API
server.port=${API_PORT:8080}
spring.datasource.url=jdbc:postgresql://${DB_HOST:127.0.0.1}:${DB_PORT:5432}/${DB_NAME:openforge}
spring.datasource.username=${DB_USER:openforge}
spring.datasource.password=${DB_PASSWORD:openforge}
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.info.env.enabled=true
info.app.version=${APP_VERSION:0.0.1-SNAPSHOT}
app.environment=${APP_ENV:local}
app.mode=${APP_MODE:paper}
app.web-origin=${WEB_ORIGIN:http://127.0.0.1:3000}
