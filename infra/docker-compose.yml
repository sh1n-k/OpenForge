services:
  db:
    image: postgres:18-alpine
    container_name: openforge-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-openforge}
      POSTGRES_USER: ${DB_USER:-openforge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-openforge}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-openforge} -d ${DB_NAME:-openforge}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:

